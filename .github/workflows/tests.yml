name: Integration tests

# Resurrected after harness `--headless` mode landed (PRs #35-#37 + daslang
# PR #2681). The integration suite runs without a display server:
#   - The harness's headless arm creates an ImGui context with a CPU font
#     atlas and discards Render() output. No GLFW window, no GL context.
#   - daslang-live forwards post-`--` argv to scripts (daslang PR #2681), so
#     `popen_argv(... "--", "--headless")` reaches the harness inside the
#     spawned subprocess.
#   - The HTTP live-API server (port 9090) runs regardless of harness mode,
#     so playwright's /status + /command + /shutdown flow is unchanged.
# libglfw3-dev still has to be installed because `imguiApp.shared_module`
# is dlopened (DLL loader resolves GLFW imports); no glfw function is ever
# called at runtime under --headless.
#
# Step-0 diagnostic matrix: ubuntu and macOS both hang in dasHV's HTTP
# serving under --headless (script's update() loop iterates fine, but
# /status never responds). Windows runs the same tests cleanly locally.
# Matrix runs all three to confirm the POSIX-vs-Windows split.
#
# Windows recipe (mirrors daslang's own extended_checks.yml):
#   - vcpkg openssl (prebuilt, avoids the perl-env libhv->OpenSSL Configure trap)
#   - Strawberry Perl on PATH (still needed for some downstream parts)
#   - msvc-dev-cmd to put cl.exe + linker on PATH so Ninja can find them
# fail-fast: false so all three OSes report regardless of which passes.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    runs-on: ${{ matrix.os }}
    env:
      # Cache daslang's C++ object compilation across runs (GitHub Actions cache
      # backend). The daslang build is a full clean rebuild every run — first run
      # populates, later runs hit. See the "Set up sccache" step + the
      # CMAKE_*_COMPILER_LAUNCHER flags on the cmake configure below.
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        # windows-latest temporarily disabled: the reset()-consolidated tests
        # fastfail (exit 0xC0000409 — __fastfail bypasses SEH, so no stack is
        # printed) ONLY on the CI windows runner; not reproducible locally or on
        # POSIX. Re-enable once crash diagnostics land (Release .pdb + dastest
        # subprocess crash-stack capture + a WER/local minidump for fastfail).
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: "Checkout daslang"
        uses: actions/checkout@v4
        with:
          repository: GaijinEntertainment/daScript
          path: daslang-src
          # master now carries PR #2684 (DASLIVE_HV_LOG=stderr env-gated libhv
          # log routing) and PR #2685 (ref_time_ticks normalized to nanoseconds
          # on every platform) — both required for this workflow to mean
          # anything on POSIX runners. Keep on master going forward.
          ref: master

      - name: "Checkout dasImgui"
        uses: actions/checkout@v4
        with:
          path: dasImgui

      - name: "Exclude workspace from Windows Defender (Windows)"
        if: matrix.os == 'windows-latest'
        shell: pwsh
        continue-on-error: true
        # GitHub-hosted Windows runners ship Defender with real-time protection
        # on: it scans every .obj/.exe/.dll written during the build and every
        # process spawned + DLL loaded at test time. With --isolated-mode the
        # suite spawns one daslang-live subprocess per test, each LoadLibrary'ing
        # 5 shared modules, so the per-spawn scan tax is paid hundreds of times.
        # Excluding the workspace path + the daslang binaries cuts both compile
        # and run wall-time. continue-on-error: a managed-Defender runner that
        # rejects the call must not fail the job.
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionProcess "daslang.exe"
          Add-MpPreference -ExclusionProcess "daslang-live.exe"

      - name: "Install system dependencies (Linux)"
        if: matrix.os == 'ubuntu-latest'
        # libglfw3-dev needed by the DLL loader for imguiApp.shared_module
        # (no glfw function is called under --headless, but dlopen resolves
        # the import). freetype/mesa/xorg: ImGui font atlas + GL headers at
        # module compile time. No xvfb — headless does not need a display.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglfw3-dev \
            libfreetype6-dev \
            mesa-common-dev \
            xorg-dev

      - name: "Install system dependencies (macOS)"
        if: matrix.os == 'macos-latest'
        # bison: macOS ships v2.3, daslang's ds_parser.ypp needs bison 3+.
        # brew install keeps the new bison at /opt/homebrew/opt/bison/bin/bison;
        # the PATH export below makes cmake pick it over /usr/bin/bison.
        run: |
          brew install glfw freetype bison
          echo "/opt/homebrew/opt/bison/bin" >> "$GITHUB_PATH"

      - name: "Install CMake and Ninja"
        uses: lukka/get-cmake@latest

      - name: "Set up sccache"
        # Installs the sccache binary and wires the GitHub Actions cache backend
        # (gated by SCCACHE_GHA_ENABLED at the job level). The cmake configure
        # below routes cl/clang/gcc through it via CMAKE_*_COMPILER_LAUNCHER.
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Set up MSVC environment (Windows)"
        if: matrix.os == 'windows-latest'
        # Put cl.exe / link.exe / lib.exe on PATH so the bash build step can
        # drive Ninja with MSVC. ilammy/msvc-dev-cmd exports the dev-env vars to
        # $GITHUB_ENV, which the subsequent bash steps inherit.
        # MUST run BEFORE the vcpkg step below: msvc-dev-cmd's vcvars sets
        # VCPKG_ROOT to the VS-bundled vcpkg, so the vcpkg step has to write our
        # VCPKG_ROOT last for the build to find our prebuilt openssl.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: "Install OpenSSL via vcpkg (Windows)"
        if: matrix.os == 'windows-latest'
        # libhv pulls in OpenSSL; vcpkg's prebuilt openssl sidesteps the perl
        # Configure trap. Runs after msvc-dev-cmd so our VCPKG_ROOT wins (above).
        run: |
          git clone https://github.com/microsoft/vcpkg
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg install openssl:x64-windows --binarycaching
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV
          echo "/c/Strawberry/perl/bin" >> $GITHUB_PATH

      - name: "Build daslang + daslang-live + shared modules"
        working-directory: daslang-src
        # Ninja on all three OSes (single-config Release, binaries in bin/).
        # Windows: cl.exe is on PATH via the msvc-dev-cmd step above; OpenSSL is
        # prebuilt from vcpkg (toolchain file QUOTED — $VCPKG_ROOT can contain
        # spaces). MSBuild (VS generator) parallelized the module build ~1.5-2x
        # slower than Ninja's global dependency graph.
        run: |
          set -eux
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cmake --no-warn-unused-cli -B./build \
              -DCMAKE_BUILD_TYPE:STRING=Release \
              -DDAS_HV_DISABLED=OFF \
              -DDAS_PUGIXML_DISABLED=OFF \
              -DDAS_LLVM_DISABLED=ON \
              -DDAS_GLFW_DISABLED=OFF \
              -DCMAKE_C_COMPILER_LAUNCHER=sccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
              -G Ninja
          else
            cmake --no-warn-unused-cli -B./build \
              -DCMAKE_BUILD_TYPE:STRING=Release \
              -DDAS_HV_DISABLED=OFF \
              -DDAS_PUGIXML_DISABLED=OFF \
              -DDAS_LLVM_DISABLED=ON \
              -DDAS_GLFW_DISABLED=OFF \
              -DCMAKE_C_COMPILER_LAUNCHER=sccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
              -G Ninja
          fi
          # daslang + daslang-live binaries plus the shared-module artifacts
          # daslang-live dlopens at runtime via `require <module>` lines in the
          # test scripts: dasModuleLiveHost (lifecycle API exported via dlsym
          # RTLD_DEFAULT), dasModuleGlfw (window/GL context — dlopened but no
          # glfw fn called under --headless), dasModuleHV (HTTP /status,
          # /command, /shutdown endpoints used by playwright), dasModulePUGIXML
          # + dasModuleStbImage (rendering deps).
          cmake --build ./build --parallel --target \
            daslang daslang-live \
            dasModuleLiveHost dasModuleGlfw dasModuleHV \
            dasModulePUGIXML dasModuleStbImage
          sccache --show-stats
          echo "BIN_DIR=bin" >> "$GITHUB_ENV"

      - name: "daspkg install dasImgui (global)"
        # Use bash-safe relative paths inside daslang-src; on Windows
        # ${{ github.workspace }} expands to a backslash path that bash
        # interprets as escape sequences (\a, etc.).
        working-directory: daslang-src
        run: |
          set -eux
          ${BIN_DIR}/daslang utils/daspkg/main.das -- \
            install ../dasImgui --global

      - name: "Run integration tests (headless)"
        working-directory: ${{ github.workspace }}/daslang-src
        # `--headless` after dastest's `--` reaches imgui_playwright via
        # get_user_args(); playwright forwards it to every spawned daslang-live
        # via popen_argv. No xvfb wrapper needed — no display is opened.
        #
        # --isolated-mode + --isolated-mode-threads 4: each test runs in its
        # own subprocess, with 4 in parallel. dastest (PR #2894) brands each
        # subprocess cmd with `--worker-index N` (N in 0..3); imgui_playwright
        # reads that flag via get_user_args() and derives a per-worker live-API
        # port (9090 + N), passed to daslang-live as `--live-port`. Without
        # the per-worker port, all 4 daslang-live children would race to bind
        # port 9090. With it, ports 9090/9091/9092/9093 are independent and
        # workers don't collide. Expected ~3× wall-time reduction vs sequential.
        #
        # ISOLATED MODE IS SAFE HERE BECAUSE EVERY [test] IS HEADLESS. They all
        # run via with_imgui_app, which spawns daslang-live under --headless: an
        # ImGui context with a CPU font atlas, NO GLFW window / GL context. So 4
        # parallel workers cost only CPU.
        #
        # RECORDINGS CANNOT RUN IN CI ON macOS. A recording drives a real windowed
        # GL host (with_recording_app, for APNG capture), but the GitHub macOS
        # runner has no usable OpenGL surface — glfwCreateWindow fails with
        # "Glfw Error 65545: NSGL: Failed to find a suitable pixel format", so the
        # host's init() panics ("can't create window") and renders nothing. (This,
        # not a render throttle, is the root of dasImgui #190: a recording produced
        # zero frames, so content-time gating spun until the wall-clock fallback.)
        # Tutorial videos are therefore recorded on Windows / real hardware, never
        # in CI. The 47 record_*.das under tests/integration are def-main driver
        # SCRIPTS (not [test]s), so dastest skips them here regardless.
        #
        # If a recording-bearing [test] is ever added AND a GL-capable runner is
        # available, it must run in a SEPARATE step WITHOUT --isolated-mode (serial,
        # one window at a time): parallel GL windows fight for the GPU.
        #
        # DASLIVE_HV_LOG=stderr: redirect libhv's logger to stderr so we see
        # event-loop/accept diagnostics in CI output. Env propagates to the
        # spawned daslang-live subprocess via popen_argv's inherited env.
        #
        # --exclude entries (all platforms): tests that drive synth IO through
        # the GLFW event queue (post_command "key_press" / "mouse_*" → glfw_live's
        # synth driver). The GLFW backend has no event queue in headless mode, so
        # these tests cannot pass. Substring-match against the file basename:
        #   glfw_synth  → test_glfw_synth_keys.das, test_glfw_synth_mouse.das
        #   key_hud     → test_visual_aids_key_hud.das (1 of N subtests is GLFW)
        # Re-include them when a windowed CI job (or a key-event abstraction
        # that bypasses GLFW under headless) lands.
        #
        # Windows-only --exclude entries: libhv's event loop on Windows CI
        # processes at most 16 POST /command connections per subprocess before
        # stalling (the event-loop batch-processing limit). Tests that require
        # more than 16 round-trips in a single subprocess invocation always hit
        # the 120 s popen timeout. We exclude any test estimated above ~12
        # POSTs to leave a 4-call safety margin. Re-include when the libhv
        # Windows IOCP path is fixed upstream.
        #   inputs_drag     → test_inputs_drag.das     (~30 POSTs)
        #   inputs_numeric  → test_inputs_numeric.das  (~30 POSTs — observed FAIL on b62a429+54a635e)
        #   inputs_slider   → test_inputs_slider.das   (~30 POSTs — observed FAIL on 54a635e)
        #   indexed_dynamic → test_indexed_dynamic.das (~20 POSTs)
        #   inputs_color    → test_inputs_color.das    (~14 POSTs — buffer)
        #   inputs_choice   → test_inputs_choice.das   (~14 POSTs — buffer)
        #   inputs_text     → test_inputs_text.das     (~13 POSTs — buffer)
        env:
          DASLIVE_HV_LOG: stderr
          DASLIVE_HV_LOG_LEVEL: DEBUG
        run: |
          set -eux
          EXTRA_EXCLUDES=""
          # dastest's total-sweep timeout defaults to 600s. The Windows runner
          # is ~3-5x slower per test than local Windows (heavy daslang-live
          # compile + GLFW shared_module load + ImGui ctx setup repeated per
          # spawned subprocess); the full sweep takes ~10-11 min on a slow
          # runner instance, which trips the default cap. Local Windows runs
          # the same sweep in ~5 min. Bump to 1800s (30 min) to give slow
          # runner instances headroom; on a fast instance the sweep finishes
          # in ~5 min and the cap never matters.
          DASTEST_TIMEOUT=600
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXTRA_EXCLUDES="--exclude inputs_drag --exclude inputs_numeric --exclude inputs_slider --exclude inputs_color --exclude inputs_choice --exclude inputs_text --exclude indexed_dynamic"
            DASTEST_TIMEOUT=1800
          fi
          ${BIN_DIR}/daslang dastest/dastest.das -- \
            --test modules/dasImgui/tests/integration \
            --timeout $DASTEST_TIMEOUT \
            --isolated-mode \
            --isolated-mode-threads 4 \
            --exclude glfw_synth \
            --exclude key_hud \
            $EXTRA_EXCLUDES \
            --headless
