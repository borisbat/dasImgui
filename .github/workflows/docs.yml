name: Build documentation

on:
  # No `paths:` filter — every push/PR rebuilds. Path filtering meant changes
  # under `examples/**` or `CHANGELOG.md` silently skipped the build, leaving
  # the published site stale relative to master. ~10 min Sphinx build is cheap
  # enough that always-rebuild is the safer default.
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# One Pages deployment at a time
concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# Layout: dasImgui is checked out as a sibling of daslang, then daspkg-installed
# globally so it lands under daslang-src/modules/dasImgui/. daslang-src/ is the
# build tree (executables, shared_modules, daslib live in place) — no separate
# `cmake --install` needed. Mirrors the supported end-user flow (daspkg install
# dasImgui --global) without nesting the source under daslang/modules/ at
# cmake-configure time (which would trip the root-cmake INCLUDE).
#
# Split into build + deploy jobs: attaching `environment: github-pages` to a
# job triggers GitHub's deployment-branch protection check *before* any step
# runs, which instant-fails non-master refs (PRs, workflow_dispatch from a
# branch). build runs on every push/PR; deploy only runs on master and is the
# only job with the environment attached, so the protection rule still gates
# the actual publish while PRs get full CI signal on the rest of the pipeline.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout daslang"
        uses: actions/checkout@v4
        with:
          repository: GaijinEntertainment/daScript
          path: daslang-src
          ref: master

      - name: "Checkout dasImgui"
        uses: actions/checkout@v4
        with:
          # Path basename becomes the daspkg install dir basename
          # (daspkg uses source basename, not .das_package's package_name).
          path: dasImgui

      - name: "Install system dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglfw3-dev \
            libfreetype6-dev \
            mesa-common-dev \
            xorg-dev

      - name: "Install CMake and Ninja"
        uses: lukka/get-cmake@latest

      - name: "Install Python dependencies"
        run: pip install -r daslang-src/doc/requirements.txt

      - name: "Build daslang"
        working-directory: daslang-src
        run: |
          set -eux
          cmake --no-warn-unused-cli -B./build \
            -DCMAKE_BUILD_TYPE:STRING=Release \
            -DDAS_HV_DISABLED=OFF \
            -DDAS_PUGIXML_DISABLED=OFF \
            -DDAS_LLVM_DISABLED=ON \
            -DDAS_GLFW_DISABLED=OFF \
            -G Ninja
          cmake --build ./build --parallel --target daslang

      - name: "daspkg install dasImgui (global)"
        run: |
          set -eux
          ${{ github.workspace }}/daslang-src/bin/daslang \
            ${{ github.workspace }}/daslang-src/utils/daspkg/main.das -- \
            install ${{ github.workspace }}/dasImgui --global

      - name: "Run imgui2rst"
        working-directory: ${{ github.workspace }}/daslang-src/modules/dasImgui
        run: |
          set -eux
          ${{ github.workspace }}/daslang-src/bin/daslang utils/imgui2rst.das -- \
            --detail_output doc/source/stdlib/generated

      - name: "Stub-gate: handmade/ must not contain '// stub'"
        working-directory: ${{ github.workspace }}/daslang-src/modules/dasImgui
        run: |
          set -eux
          if grep -rl '// stub' doc/source/stdlib/handmade/; then
            echo "ERROR: Found '// stub' placeholders in handmade docs."
            echo "Fill them with module intros before merging."
            exit 1
          fi

      - name: "Build Sphinx HTML"
        working-directory: ${{ github.workspace }}/daslang-src/modules/dasImgui
        run: |
          set -eux
          sphinx-build -W --keep-going \
            -b html -d build/sphinx-cache \
            doc/source build/site

      - name: "Stage site"
        working-directory: ${{ github.workspace }}/daslang-src/modules/dasImgui
        run: |
          set -eux
          mkdir -p _site
          cp -r build/site/. _site/
          # Disable Jekyll: GitHub Pages otherwise drops underscore-prefixed
          # Sphinx asset directories (_static/, _sources/, ...).
          touch _site/.nojekyll

      - name: "Upload Pages artifact"
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/daslang-src/modules/dasImgui/_site

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
