name: Build documentation

on:
  push:
    branches: [master]
    paths:
      - 'doc/**'
      - 'widgets/**'
      - 'src/**'
      - 'utils/imgui2rst.das'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'doc/**'
      - 'widgets/**'
      - 'src/**'
      - 'utils/imgui2rst.das'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# One Pages deployment at a time
concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# Layout: dasImgui is checked out as a sibling of daslang, then daspkg-installed
# globally into the cmake-installed daslang SDK. This mirrors the supported
# end-user flow (daspkg install dasImgui --global) instead of nesting the
# source under daslang/modules/.
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Checkout daslang"
        uses: actions/checkout@v4
        with:
          repository: GaijinEntertainment/daScript
          path: daslang-src
          ref: master

      - name: "Checkout dasImgui"
        uses: actions/checkout@v4
        with:
          path: dasImgui-src

      - name: "Install system dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglfw3-dev \
            libfreetype6-dev \
            mesa-common-dev \
            xorg-dev

      - name: "Install CMake and Ninja"
        uses: lukka/get-cmake@latest

      - name: "Install Python dependencies"
        run: pip install -r daslang-src/doc/requirements.txt

      - name: "Build and install daslang SDK"
        working-directory: daslang-src
        run: |
          set -eux
          cmake --no-warn-unused-cli -B./build \
            -DCMAKE_BUILD_TYPE:STRING=Release \
            -DDAS_HV_DISABLED=OFF \
            -DDAS_PUGIXML_DISABLED=OFF \
            -DDAS_LLVM_DISABLED=ON \
            -DDAS_GLFW_DISABLED=OFF \
            -G Ninja
          cmake --build ./build --target daslang
          cmake --install ./build --prefix ${{ github.workspace }}/daslang

      - name: "daspkg install dasImgui (global)"
        run: |
          set -eux
          ${{ github.workspace }}/daslang/bin/daslang \
            ${{ github.workspace }}/daslang/utils/daspkg/main.das -- \
            install ${{ github.workspace }}/dasImgui-src --global

      - name: "Run imgui2rst"
        working-directory: ${{ github.workspace }}/daslang/modules/dasImgui
        run: |
          set -eux
          ${{ github.workspace }}/daslang/bin/daslang utils/imgui2rst.das -- \
            --detail_output doc/source/stdlib/generated

      - name: "Stub-gate: handmade/ must not contain '// stub'"
        working-directory: ${{ github.workspace }}/daslang/modules/dasImgui
        run: |
          set -eux
          if grep -rl '// stub' doc/source/stdlib/handmade/; then
            echo "ERROR: Found '// stub' placeholders in handmade docs."
            echo "Fill them with module intros before merging."
            exit 1
          fi

      - name: "Build Sphinx HTML"
        working-directory: ${{ github.workspace }}/daslang/modules/dasImgui
        run: |
          set -eux
          sphinx-build -W --keep-going \
            -b html -d build/sphinx-cache \
            doc/source build/site

      - name: "Stage site for deployment"
        if: github.ref == 'refs/heads/master'
        working-directory: ${{ github.workspace }}/daslang/modules/dasImgui
        run: |
          set -eux
          mkdir -p _site
          cp -r build/site/. _site/
          # Disable Jekyll: GitHub Pages otherwise drops underscore-prefixed
          # Sphinx asset directories (_static/, _sources/, ...).
          touch _site/.nojekyll

      - name: "Upload Pages artifact"
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/daslang/modules/dasImgui/_site

      - name: "Deploy to GitHub Pages"
        if: github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4
